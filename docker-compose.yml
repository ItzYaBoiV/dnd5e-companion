services:
  postgres:
    image: postgres:16-alpine
    container_name: dnd5e_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Use $$ so expansion happens inside the container (matches POSTGRES_* there)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      dnd_internal:
        # Ensures hostname `postgres` resolves (some stacks only registered container_name).
        aliases:
          - postgres
    # Host-side Prisma / GUI clients (127.0.0.1 only). Change left port if 55432 is in use.
    ports:
      - "127.0.0.1:55432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dnd5e_backend
    restart: unless-stopped
    healthcheck:
      # node:20-alpine may not ship wget; fetch is always available
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DATABASE_URL is built in docker-entrypoint.sh with URL-encoded password (compose string breaks on @ : # in passwords).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Default matches container_name, which always resolves on the internal network.
      POSTGRES_HOST: ${POSTGRES_HOST:-dnd5e_postgres}
      DATABASE_URL: ${DATABASE_URL:-}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      SEED_ON_START: ${SEED_ON_START:-false}
      # Optional LLM stack (ai-workers / LiteLLM). Omitted from default compose — set in .env if you re-enable AI routes.
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-dnd-generator}
      AI_CHAT_TIMEOUT_MS: ${AI_CHAT_TIMEOUT_MS:-1800000}
      AI_CHAT_STREAM_TIMEOUT_MS: ${AI_CHAT_STREAM_TIMEOUT_MS:-1800000}
      LITELLM_CONFIG_PATH: ${LITELLM_CONFIG_PATH:-/app/litellm-config.yaml}
      # 0 = no worker polling / LiteLLM file sync (recommended when not using ai-workers).
      WORKER_RECONCILE_MS: ${WORKER_RECONCILE_MS:-0}
      WORKER_RECONCILE_INITIAL_MS: ${WORKER_RECONCILE_INITIAL_MS:-20000}
      # Host-visible logs for debugging (see ./logs/HOST_LOGS)
      FILE_LOG_DIR: /app/logs
    ports:
      - "56791:3001"
    volumes:
      - ./logs/backend:/app/logs
      # Optional: mount LiteLLM config + worker registry + docker.sock when using ai-workers/ (see ai-workers/README.md).
      # - ./ai-workers/load-balancer/litellm-config.yaml:/app/litellm-config.yaml
      # - ./ai-workers/load-balancer/worker-registry.json:/app/worker-registry.json
      # - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dnd_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dnd5e_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "56790:4173"
    networks:
      - dnd_internal

volumes:
  postgres_data:

networks:
  dnd_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
